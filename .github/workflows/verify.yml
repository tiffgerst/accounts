name: Verify
on:
  workflow_call:
    secrets:
      VITE_RPC_CREDENTIALS:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Check code
        run: pnpm -w check

      - name: Check build
        run: pnpm -w build

      - name: Check types
        run: pnpm -r --if-present check:types

  test-localnet:
    name: 'Test Runtime (env: localnet, tag: ${{ matrix.tag }})'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_RYUK_DISABLED: true
    strategy:
      matrix:
        tag:
          - latest
          - https://rpc.moderato.tempo.xyz

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          playwright: 'true'

      - name: Setup Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0

      - name: Resolve Tempo image digest
        if: "!startsWith(matrix.tag, 'http')"
        id: tempo-digest
        run: |
          digest=$(docker manifest inspect ghcr.io/tempoxyz/tempo:${{ matrix.tag }} -v 2>/dev/null | jq -r '.[0].Descriptor.digest // .Descriptor.digest' 2>/dev/null || docker buildx imagetools inspect ghcr.io/tempoxyz/tempo:${{ matrix.tag }} --format '{{.Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Cache Tempo Docker image
        if: "!startsWith(matrix.tag, 'http')"
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: docker-cache
        with:
          path: /tmp/tempo-image.tar
          key: tempo-image-${{ steps.tempo-digest.outputs.digest }}

      - name: Load cached Tempo image
        if: "!startsWith(matrix.tag, 'http') && steps.docker-cache.outputs.cache-hit == 'true'"
        run: docker load -i /tmp/tempo-image.tar

      - name: Pull and cache Tempo image
        if: "!startsWith(matrix.tag, 'http') && steps.docker-cache.outputs.cache-hit != 'true'"
        run: |
          docker pull ghcr.io/tempoxyz/tempo:${{ matrix.tag }}
          docker save ghcr.io/tempoxyz/tempo:${{ matrix.tag }} -o /tmp/tempo-image.tar

      - name: Run tests
        run: pnpm test --bail=1
        env:
          CI: true
          VITE_NODE_TAG: ${{ matrix.tag }}
          VITE_RPC_CREDENTIALS: ${{ secrets.VITE_RPC_CREDENTIALS }}
