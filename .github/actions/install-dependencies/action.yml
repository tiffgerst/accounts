name: 'Install dependencies'
description: 'Prepare repository and all dependencies'

inputs:
  playwright:
    description: 'Install Playwright browsers'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Get Playwright version
      if: inputs.playwright == 'true'
      id: playwright-version
      shell: bash
      run: echo "version=$(node -e "const lf = require('fs').readFileSync('pnpm-lock.yaml','utf8'); const m = lf.match(/playwright@(\d+\.\d+\.\d+)/); process.stdout.write(m?.[1] ?? 'unknown')")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      if: inputs.playwright == 'true'
      id: playwright-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: inputs.playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpx playwright install chromium --with-deps

    - name: Install Playwright system deps
      if: inputs.playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: pnpx playwright install-deps chromium
